<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}POKÉMON FIRE RED EDITION{% endblock %}</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="index.php">HOME</a>
      <a href="Pokemon.php">POKÉDEX</a>
      <a href="treinadores_listar.php">TREINADORES</a>
      <a href="trocas_listar.php">TROCAS</a>

      {% if session.treinador_id %}
      <a href="treinadores_editar.php?id={{ session.treinador_id }}"
        >EDITAR PERFIL</a
      >
      <span
        style="display: inline-flex; align-items: center; margin-left: 15px"
      >
        <img
          src="{{ session.treinador_foto|default('img/default-avatar.png') }}"
          style="
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid white;
            margin-right: 5px;
          "
        />
      </span>
      <a href="logout.php" style="color: #ffde00"
        >SAIR DA CONTA ({{ session.treinador_nome|upper }})</a
      >
      {% else %}
      <a href="login.php">LOGIN</a>
      <a href="treinadores_inserir.php">CADASTRO</a>
      {% endif %}
    </nav>

    <div class="main-container">
      <main>{% block content %}{% endblock %}</main>
    </div>

    <footer>
      <p>&copy; 2026 POKÉMON FIRE RED SYSTEM - TODAS AS INSÍGNIAS RESERVADAS</p>
    </footer>
  </body>
</html>
