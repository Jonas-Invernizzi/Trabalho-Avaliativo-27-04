<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}POKéSYSTEM{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --poke-red: #CC0000;
            --poke-blue: #3B4CCA;
            --poke-yellow: #FFCB05;
            --poke-dark: #303030;
            --poke-light: #F8F8F8;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            background-color: #e0e0e0;
            color: var(--poke-dark);
        }

        .main-header {
            background-color: var(--poke-red);
            color: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid var(--poke-dark);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .site-brand {
            font-size: 1.2rem;
            color: var(--poke-yellow);
            text-decoration: none;
            flex: 1;
            text-shadow: 2px 2px var(--poke-dark);
        }

        .nav-menu {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex: 2;
        }

        .nav-menu a {
            color: var(--white);
            text-decoration: none;
            font-size: 0.7rem;
            padding: 5px;
        }

        .nav-menu a:hover {
            background: var(--poke-dark);
            color: var(--poke-yellow);
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
            flex: 1;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border: 3px solid var(--poke-dark);
            border-radius: 50%;
            object-fit: cover;
            background-color: white;
        }

        .pokemon-panel {
            background: var(--white);
            border: 4px solid var(--poke-dark);
            padding: 20px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        input, button, select, textarea {
            font-family: 'Press Start 2P', cursive;
            padding: 10px;
            border: 3px solid var(--poke-dark);
            margin-top: 5px;
            font-size: 0.7rem;
            outline: none;
        }

        input:focus { border-color: var(--poke-blue); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border: 4px solid var(--poke-dark); }
        th { background: var(--poke-dark); color: var(--poke-yellow); padding: 12px; text-align: left; font-size: 0.6rem; }
        td { border-bottom: 3px solid #eee; padding: 12px; font-size: 0.6rem; }
        tr:last-child td { border-bottom: none; }

        .error { color: white; background: var(--poke-red); padding: 10px; font-size: 0.5rem; border: 3px solid var(--poke-dark); margin-bottom: 20px; }

        /* Grid de Pokémons */
        .pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .pokemon-card { background: var(--white); border: 4px solid var(--poke-dark); padding: 15px; text-align: center; position: relative; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
        .pokemon-name { font-size: 0.7rem; margin: 10px 0; display: block; }
        .dex-number { font-size: 0.5rem; color: #888; }
        .type-tag { display: inline-block; padding: 4px 8px; border: 2px solid var(--poke-dark); font-size: 0.4rem; margin: 2px; background: #f0f0f0; }
        .caught-badge { position: absolute; top: -10px; right: -10px; background: var(--poke-yellow); border: 2px solid var(--poke-dark); padding: 5px; font-size: 0.4rem; transform: rotate(12deg); z-index: 10; }

        /* Mercado de Trocas */
        .trade-card { display: flex; align-items: center; justify-content: space-around; padding: 20px; gap: 15px; }
        .trade-separator { font-size: 1.5rem; color: var(--poke-red); }

        .actions { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        .btn-link { text-decoration: none; color: var(--poke-blue); font-size: 0.5rem; border: 2px solid transparent; padding: 2px; }
        .btn-link:hover { border-color: var(--poke-blue); }

        button {
            background: var(--poke-blue);
            color: white;
            cursor: pointer;
        }

        button:hover { background: var(--poke-yellow); color: var(--poke-dark); }

        .content { padding: 3rem 2rem; max-width: 1000px; margin: auto; }

        h2 { border-left: 10px solid var(--poke-red); padding-left: 15px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <header class="main-header">
        <a href="index.php" class="site-brand">
            POKéSYSTEM
        </a>

        <nav class="nav-menu">
            <a href="Pokemon.php">DEX</a>
            <a href="treinadores_listar.php">TREINADORES</a>
            <a href="trocas_listar.php">TROCAS</a>
        </nav>

        <div class="user-actions">
            {% if session.treinador_id %}
                <span style="font-size: 0.6rem;">{{ session.treinador_nome|upper }}</span>
                <a href="treinador_perfil.php?id={{ session.treinador_id }}">
                    <img src="{{ session.treinador_foto }}" class="profile-img" alt="Avatar">
                </a>
                <a href="logout.php" style="color: var(--poke-yellow); font-size: 0.6rem;">[SAIR]</a>
            {% else %}
                <a href="login.php" style="color: white; text-decoration: none;">LOGIN</a>
            {% endif %}
        </div>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
