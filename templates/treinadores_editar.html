{% extends "base.html" %}
{% block content %}
<div class="pokemon-panel" style="max-width: 600px; margin: auto;">
    <h2>EDITAR PERFIL</h2>
    <form action="treinadores_editar.php" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="hidden" name="id" value="{{ treinador.id }}">
        
        <div>
            <label>NOME:</label><br>
            <input type="text" name="nome" value="{{ treinador.nome }}" required style="width: 100%;">
        </div>
        <div>
            <label>EMAIL:</label><br>
            <input type="email" name="email" value="{{ treinador.email }}" required style="width: 100%;">
        </div>
        <div>
            <label>CIDADE:</label><br>
            <input type="text" name="cidade" value="{{ treinador.cidade }}" style="width: 100%;">
        </div>
        <div>
            <label>FOTO DE PERFIL:</label><br>
            <input type="file" name="foto_perfil">
        </div>
        
        <button type="submit">ATUALIZAR DADOS</button>
        <a href="treinadores_listar.php" class="btn-link" style="display: block; text-align: center; margin-top: 10px;">VOLTAR</a>
    </form>
</div>
{% endblock %}
