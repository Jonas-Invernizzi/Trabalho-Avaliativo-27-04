{% extends 'base.html' %}

{% block title %}Cadastrar Treinador{% endblock %}

{% block content %}
    <div class="pokemon-panel" style="max-width: 850px; margin: auto;">
        <h2>NOVO TREINADOR</h2>
        {% if erro %}<div class="error">{{ erro }}</div>{% endif %}
        <form action="treinadores_inserir.php" method="post" enctype="multipart/form-data">
            <div style="display: flex; gap: 30px; align-items: stretch;">
                <!-- Lado Esquerdo: Campos do Formulário -->
                <div style="flex: 1; display: flex; flex-direction: column; gap: 15px;">
                    <div>
                        <label>NOME COMPLETO:</label>
                        <input type="text" name="nome" required style="width: 100%;">
                    </div>

                    <div>
                        <label>E-MAIL:</label>
                        <input type="email" name="email" required style="width: 100%;">
                    </div>

                    <div>
                        <label>SENHA:</label>
                        <input type="password" name="senha" required style="width: 100%;"
                               pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*_=+-]).{8,}$"
                               title="Mínimo de 8 caracteres, uma letra maiúscula, uma minúscula, um número e um caractere especial.">
                    </div>

                    <div>
                        <label>CONFIRMAR SENHA:</label>
                        <input type="password" name="senha_confirm" required style="width: 100%;">
                    </div>

                    <div>
                        <label>CIDADE NATAL:</label>
                        <input type="text" name="cidade" placeholder="Ex: Lavender Town" style="width: 100%;">
                    </div>
                </div>

                <!-- Lado Direito: Preview da Imagem -->
                <div style="width: 250px; text-align: center; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;">
                    <label>PREVIEW:</label>
                    <div style="width: 250px; flex: 1; border: 4px solid var(--poke-dark); background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <img id="img-preview" src="img/default-avatar.png" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    
                    <div style="text-align: left;">
                        <label style="font-size: 0.6rem;">FOTO DE PERFIL:</label>
                        <input type="file" name="foto_perfil" id="foto_perfil_input" accept="image/*" style="width: 100%; font-size: 0.6rem; padding: 8px;">
                    </div>
                </div>
            </div>

            <button type="submit" style="width: 100%; margin-top: 20px;">INICIAR JORNADA</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.6rem; text-align: center;">
            JÁ TEM CONTA? <a href="login.php" class="btn-link">FAÇA LOGIN</a>
        </p>
    </div>

    <script>
        document.getElementById('foto_perfil_input').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('img-preview').setAttribute('src', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
{% endblock %}
