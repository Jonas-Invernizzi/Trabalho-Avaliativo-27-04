{% extends 'base.html' %} {% block title %}Anunciar Troca{% endblock %} {% block
content %}
<h2 style="text-align: center">CENTRO DE TROCAS</h2>

{% if erro %}
<p class="error">{{ erro }}</p>
{% endif %}

<form action="trocas_inserir.php" method="post">
  <div class="form-main-content">
    <div class="form-fields-group">
      <div class="form-field-half">
        <label>VOCÊ OFERECE:</label>
        <select name="captura_id_oferecida" required>
          <option value="">Selecione um Pokémon seu...</option>
          {% for captura in minhas_capturas %}
          <option
            value="{{ captura.id }}"
            data-dex="{{ captura.numero_dex }}"
            data-shiny="{{ captura.is_shiny }}"
            data-qtd="{{ captura.quantidade_disponivel }}"
            {% if pre_selected_oferecida == captura.id %}selected{% endif %}
          >
            #{{ "%03d"|format(captura.numero_dex) }} ({{
            captura.quantidade_disponivel }})
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-field-half">
        <label
          >{% if outro_treinador %}O QUE {{ outro_treinador.nome|upper }} TEM
          DISPONÍVEL:{% else %}VOCÊ PROCURA:{% endif %}</label
        >
        <select name="pokedex_id_desejado" required>
          <option value="">Selecione o Pokémon desejado...</option>
          {% if outro_treinador %} {# Se viemos do perfil de alguém, mostra
          apenas o que ele tem disponível para troca #} {% for c in
          pokemons_outro_treinador %}
          <option
            value="{{ c.pokedex_id }}"
            data-dex="{{ c.numero_dex }}"
            data-shiny="{{ c.is_shiny }}"
            {% if pre_selected_desejada == c.pokedex_id %}selected{% endif %}
          >
            #{{ "%03d"|format(c.numero_dex) }} {% if c.is_shiny %}(Shiny){%
            endif %}
          </option>
          {% endfor %} {% else %} {# Caso contrário, mostra a pokedex inteira #}
          {% for p in pokedex %}
          <option
            value="{{ p.id }}"
            data-dex="{{ p.numero_dex }}"
            data-shiny="{{ p.is_shiny }}"
            {% if pre_selected_desejada == p.id %}selected{% endif %}
          >
            #{{ "%03d"|format(p.numero_dex) }} {% if p.is_shiny %}(Shiny){%
            endif %}
          </option>
          {% endfor %} {% endif %}
        </select>
      </div>
    </div>
  </div>

  <!-- Interface de Preview Personalizada -->
  <div class="trade-visualizer">
    <div id="preview-oferecido" class="trade-box-preview">
      <label>VOCÊ ENVIA:</label>
      <img
        id="img-oferecido"
        src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"
        alt="Oferecido"
        style="width: 96px; image-rendering: pixelated; opacity: 0.5"
      />
      <strong
        id="name-oferecido"
        class="pokemon-name"
        style="font-size: 0.6rem; color: #999"
        >SEU POKÉMON</strong
      >
    </div>

    <div
      class="trade-separator"
      style="
        font-size: 40px;
        color: var(--poke-blue);
        text-shadow: 2px 2px rgba(0, 0, 0, 0.1);
      "
    >
      ⇄
    </div>

    <div id="preview-desejado" class="trade-box-preview">
      <label>VOCÊ RECEBE:</label>
      <img
        id="img-desejado"
        src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"
        alt="Desejado"
        style="width: 96px; image-rendering: pixelated; opacity: 0.5"
      />
      <strong
        id="name-desejado"
        class="pokemon-name"
        style="font-size: 0.6rem; color: #999"
        >PROCURADO</strong
      >
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">CRIAR OFERTA DE TROCA</button>
    <a href="trocas_listar.php" class="btn btn-secondary">VOLTAR AO MERCADO</a>
  </div>
</form>
<script>
  const typeLabels = {
    grass: "PLANTA",
    poison: "VENENO",
    fire: "FOGO",
    flying: "VOADOR",
    water: "ÁGUA",
    bug: "INSETO",
    normal: "NORMAL",
    electric: "ELÉTRICO",
    ground: "TERRA",
    fairy: "FADA",
    fighting: "LUTADOR",
    psychic: "PSÍQUICO",
    rock: "PEDRA",
    steel: "AÇO",
    ice: "GELO",
    ghost: "FANTASMA",
    dragon: "DRAGÃO",
    dark: "SOMBRIO",
  };

  function updatePokemonPreview(
    selectElement,
    imgElement,
    nameElement,
    previewContainer,
  ) {
    const selectedOption = selectElement.options[selectElement.selectedIndex];
    const dex = selectedOption.dataset.dex;
    const shiny = selectedOption.dataset.shiny === "1";

    if (dex) {
      const imageUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${shiny ? "shiny/" : ""}${dex}.png`;
      imgElement.src = imageUrl;
      imgElement.classList.toggle("shiny-glow", shiny);
      imgElement.style.opacity = "1";

      fetch(`https://pokeapi.co/api/v2/pokemon/${dex}`)
        .then((r) => r.json())
        .then((data) => {
          nameElement.textContent =
            data.name.toUpperCase() + (shiny ? " ✨SHINY" : "");
          nameElement.style.color = "var(--poke-dark)";
        });
    } else {
      // Volta para o estado de placeholder
      imgElement.src =
        "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png";
      imgElement.style.opacity = "0.5";
      imgElement.classList.remove("shiny-glow");
      nameElement.textContent =
        selectElement.name === "captura_id_oferecida"
          ? "SEU POKÉMON"
          : "PROCURADO";
      nameElement.style.color = "#999";
    }
  }

  const selectOferecida = document.querySelector(
    'select[name="captura_id_oferecida"]',
  );
  const selectDesejado = document.querySelector(
    'select[name="pokedex_id_desejado"]',
  );

  selectOferecida.addEventListener("change", () =>
    updatePokemonPreview(
      selectOferecida,
      document.getElementById("img-oferecido"),
      document.getElementById("name-oferecido"),
      document.getElementById("preview-oferecido"),
    ),
  );
  selectDesejado.addEventListener("change", () =>
    updatePokemonPreview(
      selectDesejado,
      document.getElementById("img-desejado"),
      document.getElementById("name-desejado"),
      document.getElementById("preview-desejado"),
    ),
  );

  // Atualiza previews iniciais caso já haja seleções (ex: vindo de um wishlist)
  updatePokemonPreview(
    selectOferecida,
    document.getElementById("img-oferecido"),
    document.getElementById("name-oferecido"),
    document.getElementById("preview-oferecido"),
  );
  updatePokemonPreview(
    selectDesejado,
    document.getElementById("img-desejado"),
    document.getElementById("name-desejado"),
    document.getElementById("preview-desejado"),
  );

  // Carregamento automático de nomes nos Selects (essencial pois o banco não tem nomes)
  document.querySelectorAll("select option[data-dex]").forEach((opt) => {
    const dex = opt.dataset.dex;
    fetch(`https://pokeapi.co/api/v2/pokemon/${dex}`)
      .then((r) => r.json())
      .then((data) => {
        const isShiny = opt.dataset.shiny === "1";
        const qtd = opt.dataset.qtd;
        const shinyLabel = isShiny ? " ✨SHINY" : "";
        const qtdLabel = qtd ? ` (${qtd})` : "";
        const name = data.name.toUpperCase();
        opt.text = `#${dex.padStart(3, "0")} ${name}${shinyLabel}${qtdLabel}`;
      });
  });
</script>
{% endblock %}
