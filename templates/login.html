{% extends 'base.html' %} {% block title %}Login{% endblock %} {% block content
%}
<div class="auth-container">
  <h2 style="text-align: center; margin-top: 40px">LOGIN</h2>
  {% if erro %}
  <p class="error">{{ erro }}</p>
  {% endif %}
  <form action="login.php" method="post">
    <div>
      <label for="email">E-MAIL:</label>
      <input type="email" id="email" name="email" required />
    </div>
    <div>
      <label for="senha">SENHA:</label>
      <input type="password" id="senha" name="senha" required />
    </div>
    <div style="text-align: center; margin-top: 30px">
      <button
        type="submit"
        class="btn btn-primary"
        style="padding: 15px 30px; font-size: 12px"
      >
        Entrar
      </button>
    </div>
  </form>
  <p style="margin-top: 40px; font-size: 10px; text-align: center">
    AINDA NÃO É UM TREINADOR?
    <a href="treinadores_inserir.php" style="color: var(--fr-blue)"
      >CADASTRE-SE AQUI</a
    >
  </p>
</div>
{% endblock %}
