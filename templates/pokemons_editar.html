{% extends "base.html" %} {% block content %}
<h3>Editar Jogos</h3>
<hr />
<br />
<form action="jogos_editar.php" method="post" enctype="multipart/form-data">
  <input type="hidden" name="id" value=" {{ jogo.id }}" />
  <input type="text" name="nome" placeholder="Nome" value="{{ jogo.nome }}" />

  Estilo:<select name="estilo">
    <option value="acao" {% if jogo.estilo="" ="acao" %} selected {% endif %}>
      Ação
    </option>
    <option value="tiro" {% if jogo.estilo="" ="tiro" %} selected {% endif %}>
      Tiro
    </option>
    <option value="rpg" {% if jogo.estilo="" ="rpg" %} selected {% endif %}>
      RPG
    </option>
  </select>
  <br />
  Capa: <input type="file" name="capa" />
  <input type="date" name="lancamento" value="{{ jogo.lancamento }}" />
  <br />

  <div style="text-align: center; margin-top: 20px">
    <button type="submit" class="btn btn-primary">Gravar</button>
  </div>
</form>
{% endblock %}
